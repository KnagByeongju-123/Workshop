<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>⛳ 미니 파크골프</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1a10;--s1:#0f2418;--s2:#16351f;--border:#1d4429;
  --green:#34d399;--green2:#10b981;--yellow:#fbbf24;--sand:#f4d03f;
  --water:#3b82f6;--red:#ef4444;
  --text:#e8f3ed;--muted:#6b8676;--rr:12px;
}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:1;overflow-y:auto;overflow-x:hidden}
.screen.active{display:flex}

.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{border-color:var(--green);color:var(--green)}
.topbar-title{flex:1;text-align:center;font-family:'Jua',sans-serif;font-size:16px;color:var(--green)}

#lobbyScreen{padding:0}
.lobby-content{width:100%;max-width:460px;margin:0 auto;padding:20px;text-align:center}
.game-logo{font-size:64px;margin-bottom:6px;animation:swing 2s ease-in-out infinite}
@keyframes swing{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.game-title{font-family:'Jua',sans-serif;font-size:30px;background:linear-gradient(135deg,#34d399,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:.05em}
.game-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7}
.name-input{width:100%;background:var(--s2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;padding:12px 16px;outline:none;margin-bottom:20px;text-align:center}
.name-input:focus{border-color:var(--green)}
.avatar-label{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:left}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:22px}
.av-btn{background:var(--s2);border:2px solid var(--border);border-radius:10px;padding:8px 4px;cursor:pointer;font-size:22px;transition:all .15s;text-align:center}
.av-btn.sel{border-color:var(--yellow);background:rgba(251,191,36,.12);transform:scale(1.06)}
.av-name{font-size:10px;color:var(--muted);margin-top:2px}
.start-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:var(--rr);color:#fff;font-family:'Jua',sans-serif;font-size:19px;cursor:pointer;box-shadow:0 4px 20px rgba(52,211,153,.3)}
.start-btn:disabled{opacity:.4;cursor:not-allowed}
.sub-btn{width:100%;padding:10px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif}
.sub-btn:hover{border-color:var(--green);color:var(--green)}

#holesScreen{padding:0}
.holes-body{flex:1;padding:16px 20px;overflow-y:auto}
.score-summary{background:linear-gradient(135deg,rgba(52,211,153,.08),rgba(251,191,36,.06));border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-around;text-align:center}
.ss-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.ss-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--yellow)}
.holes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hole-card{background:var(--s1);border:2px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s}
.hole-card:hover{border-color:var(--green);transform:translateY(-2px)}
.hole-card.done{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.05)}
.hole-num{font-family:'Jua',sans-serif;font-size:22px;color:var(--green);margin-bottom:4px}
.hole-par{font-size:11px;color:var(--muted);margin-bottom:6px}
.hole-strokes{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.hole-strokes.under{color:#4ade80}
.hole-strokes.over{color:#f87171}
.hole-strokes.par{color:var(--yellow)}
.hole-strokes.none{color:var(--muted);font-size:11px}
.holes-btns{display:flex;gap:10px;padding:12px 20px 20px}
.holes-btns button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:'Jua',sans-serif;font-size:14px;cursor:pointer}

#gameScreen{padding:0}
.game-top{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:13px}
.stat{padding:3px 10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px}
.stat .lab{color:var(--muted);margin-right:4px;font-size:10px}
.stat .val{color:var(--green);font-weight:600}
.stat.strokes .val{color:var(--yellow)}
.game-canvas-wrap{flex:1;position:relative;background:#0a1d12;overflow:hidden}
#golfCanvas{display:block;width:100%;height:100%;touch-action:none}
.game-ui{position:absolute;left:0;right:0;bottom:0;padding:12px 14px;background:linear-gradient(180deg,transparent,rgba(11,26,16,.95));display:flex;flex-direction:column;gap:8px}
.shot-bar{display:flex;gap:10px;align-items:center}
.slider-wrap{flex:1}
.slider-label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:3px}
.slider-label .v{color:var(--yellow);font-family:'JetBrains Mono',monospace;font-weight:700}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;background:var(--s2);border-radius:3px;outline:none;border:1px solid var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--yellow);cursor:pointer;border:2px solid var(--bg)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--yellow);cursor:pointer;border:2px solid var(--bg)}
.shot-btn{padding:12px 24px;background:linear-gradient(135deg,var(--red),#c41e3a);border:none;border-radius:10px;color:#fff;font-family:'Jua',sans-serif;font-size:16px;cursor:pointer;min-width:80px}
.shot-btn:active{transform:scale(.95)}
.shot-btn:disabled{opacity:.4}
.hole-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(11,26,16,.95);border:2px solid var(--green);border-radius:16px;padding:24px 32px;text-align:center;z-index:50;display:none;max-width:85%}
.hole-banner .emoji{font-size:48px;margin-bottom:8px;display:block}
.hole-banner .title{font-family:'Jua',sans-serif;font-size:24px;color:var(--yellow);margin-bottom:6px}
.hole-banner .sub{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:14px}
.hole-banner button{padding:10px 24px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:10px;color:#fff;font-family:'Jua',sans-serif;font-size:14px;cursor:pointer}

#settingsScreen{padding:0}
.settings-body{flex:1;overflow-y:auto;padding:20px}
.settings-inner{max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.info-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:12px;font-size:12px;color:#93c5fd;line-height:1.7}
.cfg-label{font-size:12px;color:var(--muted);margin-bottom:5px}
.cfg-input-wrap{position:relative}
.cfg-input-wrap input{width:100%;background:var(--s2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:11px 42px 11px 12px;outline:none}
.cfg-input-wrap input:focus{border-color:var(--green)}
.cfg-input-wrap .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)}
.cfg-save-btn{padding:13px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:10px;color:#fff;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer}
.cfg-status{min-height:18px;font-size:12px;text-align:center}
.cfg-current{display:none;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px}
.cfg-clear{margin-top:8px;background:none;border:1px solid rgba(239,68,68,.3);border-radius:6px;color:#fca5a5;font-size:11px;padding:4px 10px;cursor:pointer}

#lbScreen{padding:0}
.lb-body{flex:1;overflow-y:auto;padding:14px 18px}
.lb-title{font-family:'Jua',sans-serif;font-size:18px;text-align:center;margin-bottom:12px;color:var(--yellow)}
.lb-row{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.lb-row.me{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.06)}
.lb-rank{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;width:28px;text-align:center}
.rank-1{color:#ffd700}.rank-2{color:#c0c0c0}.rank-3{color:#cd7f32}
.lb-av{font-size:22px}
.lb-name-wrap{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:500}
.lb-detail{font-size:10px;color:var(--muted);margin-top:1px}
.lb-right{text-align:right}
.lb-total{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--yellow);font-weight:700}
.lb-sub{font-size:9px;color:var(--muted)}

#errBox{display:none;position:fixed;top:60px;left:10px;right:10px;z-index:9999;background:rgba(239,68,68,.95);color:#fff;padding:10px 14px;border-radius:8px;font-size:11px;font-family:monospace;max-height:40vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all}

@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
.splash-text{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(59,130,246,.9);color:#fff;padding:10px 20px;border-radius:8px;font-family:'Jua',sans-serif;font-size:15px;z-index:20;pointer-events:none;animation:fadeOut 1.2s forwards}
</style>
</head>
<body>

<div id="errBox">
  <button id="errCloseBtn" style="float:right;background:rgba(0,0,0,.3);color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer">✕</button>
  <div id="errContent"></div>
</div>
<script>
window.addEventListener('error', e => {
  const b=document.getElementById('errBox'),c=document.getElementById('errContent');
  if(b&&c){b.style.display='block';c.textContent+=`[ERR] ${e.message}\n @${e.filename}:${e.lineno}\n\n`;}
});
</script>

<!-- LOBBY -->

<script>
// ════ CONFIG ════
let SUPABASE_URL = localStorage.getItem('pg_sb_url') || '';
let SUPABASE_KEY = localStorage.getItem('pg_sb_key') || '';

const AVATARS = [
  {e:'🧑‍💼',n:'직장인'},{e:'👩‍🔬',n:'과학자'},{e:'🧙‍♂️',n:'마법사'},{e:'🥷',n:'닌자'},
  {e:'🤖',n:'로봇'},{e:'🦸',n:'히어로'},{e:'🧜‍♀️',n:'인어'},{e:'🐉',n:'드래곤'},
  {e:'👨‍🚀',n:'우주인'},{e:'🎅',n:'산타'},{e:'🦊',n:'여우'},{e:'🐼',n:'판다'},
];

// 9홀 코스 (비율 좌표)
const HOLES = [
  {par:2, ball:{x:0.15,y:0.7}, hole:{x:0.85,y:0.3}, obs:[]},
  {par:3, ball:{x:0.15,y:0.8}, hole:{x:0.85,y:0.2}, obs:[{type:'sand',x:0.5,y:0.5,r:0.1}]},
  {par:3, ball:{x:0.1,y:0.5}, hole:{x:0.9,y:0.5}, obs:[{type:'water',x:0.4,y:0.3,w:0.2,h:0.4}]},
  {par:3, ball:{x:0.15,y:0.85}, hole:{x:0.85,y:0.15}, obs:[{type:'wall',x:0.45,y:0.4,w:0.08,h:0.35}]},
  {par:4, ball:{x:0.1,y:0.5}, hole:{x:0.9,y:0.5}, obs:[{type:'sand',x:0.35,y:0.4,r:0.08},{type:'sand',x:0.65,y:0.6,r:0.08}]},
  {par:4, ball:{x:0.15,y:0.8}, hole:{x:0.85,y:0.8}, obs:[{type:'wall',x:0.3,y:0.3,w:0.4,h:0.06},{type:'wall',x:0.3,y:0.3,w:0.05,h:0.25}]},
  {par:4, ball:{x:0.1,y:0.85}, hole:{x:0.9,y:0.15}, obs:[{type:'water',x:0.3,y:0.35,w:0.4,h:0.18}]},
  {par:5, ball:{x:0.1,y:0.5}, hole:{x:0.9,y:0.5}, obs:[{type:'wall',x:0.4,y:0.2,w:0.06,h:0.45},{type:'sand',x:0.72,y:0.35,r:0.08}]},
  {par:5, ball:{x:0.1,y:0.85}, hole:{x:0.9,y:0.15}, obs:[{type:'wall',x:0.3,y:0.3,w:0.06,h:0.4},{type:'water',x:0.55,y:0.55,w:0.2,h:0.16},{type:'sand',x:0.78,y:0.3,r:0.07}]},
];

let player = {name:'', avatar:'🧑‍💼'};
let scores = {};
let currentHole = 1;
let gameState = null;
let canvas, ctx, W, H;
let _settingsFrom = 'lobbyScreen';

// ════ SUPABASE ════
async function sbFetch(path, opts={}) {
  if(!SUPABASE_URL || !SUPABASE_KEY) throw new Error('Supabase 미설정');
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), 5000);
  return fetch(`${SUPABASE_URL}${path}`, {
    ...opts,
    headers: {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',...opts.headers},
    signal: ctrl.signal
  });
}

async function sbUpsert(hole, strokes) {
  try {
    const res = await sbFetch('/rest/v1/golf_scores', {
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({player_name:player.name, avatar:player.avatar, hole_num:hole, strokes})
    });
    return res.ok;
  } catch(e){ return false; }
}

async function sbGetMy(name) {
  try {
    const res = await sbFetch(`/rest/v1/golf_scores?player_name=eq.${encodeURIComponent(name)}&select=hole_num,strokes`);
    if(!res.ok) return {};
    const rows = await res.json();
    const m = {};
    rows.forEach(r => m[r.hole_num] = r.strokes);
    return m;
  } catch(e){ return {}; }
}

async function sbGetLeaderboard() {
  try {
    const res = await sbFetch(`/rest/v1/golf_leaderboard?select=*&order=total_strokes.asc&limit=100`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  } catch(e){ return null; }
}

async function sbDeleteMy(name) {
  try { await sbFetch(`/rest/v1/golf_scores?player_name=eq.${encodeURIComponent(name)}`,{method:'DELETE'}); } catch(e){}
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('nameInput').addEventListener('input', e => {
  document.getElementById('startBtn').disabled = !e.target.value.trim();
});

async function startGame() {
  const n = document.getElementById('nameInput').value.trim();
  if(!n) return;
  player.name = n;
  const btn = document.getElementById('startBtn');
  btn.disabled = true; btn.textContent = '⏳ 불러오는 중...';
  if(!SUPABASE_URL || !SUPABASE_KEY) {
    alert('먼저 ⚙️ 버튼으로 Supabase 설정을 해주세요.');
    btn.disabled = false; btn.textContent = '🏌️‍♂️ 게임 시작';
    return;
  }
  scores = await sbGetMy(n);
  btn.disabled = false; btn.textContent = '🏌️‍♂️ 게임 시작';
  showHoles();
}

// ════ HOLES ════
function showHoles() {
  showScreen('holesScreen');
  updateHoles();
}

function updateHoles() {
  const done = Object.keys(scores).length;
  document.getElementById('ssDone').textContent = done;
  const totalStrokes = Object.values(scores).reduce((a,b)=>a+b,0);
  const totalPar = Object.keys(scores).reduce((a,k)=>a+HOLES[k-1].par,0);
  document.getElementById('ssTotal').textContent = totalStrokes || '—';
  const d = document.getElementById('ssDelta');
  if(done > 0) {
    const delta = totalStrokes - totalPar;
    d.textContent = delta === 0 ? 'E' : delta > 0 ? `+${delta}` : `${delta}`;
    d.style.color = delta <= 0 ? '#4ade80' : '#f87171';
  } else {
    d.textContent = '—';
  }

  const grid = document.getElementById('holesGrid');
  grid.innerHTML = '';
  HOLES.forEach((h, i) => {
    const n = i+1;
    const s = scores[n];
    const isDone = s !== undefined;
    const div = document.createElement('div');
    div.className = 'hole-card' + (isDone?' done':'');
    let strokeHtml = '<div class="hole-strokes none">미완료</div>';
    if(isDone) {
      const diff = s - h.par;
      const cls = diff < 0 ? 'under' : diff > 0 ? 'over' : 'par';
      const label = diff === 0 ? `${s}타 E` : diff < 0 ? `${s}타 ${diff}` : `${s}타 +${diff}`;
      strokeHtml = `<div class="hole-strokes ${cls}">${label}</div>`;
    }
    div.innerHTML = `<div class="hole-num">H${n}</div><div class="hole-par">Par ${h.par}</div>${strokeHtml}`;
    div.addEventListener('click', () => startHole(n));
    grid.appendChild(div);
  });
}

async function resetMyScores() {
  if(!confirm('내 점수를 모두 초기화할까요?')) return;
  await sbDeleteMy(player.name);
  scores = {};
  updateHoles();
}

// ════ GAME ════
function startHole(n) {
  currentHole = n;
  const h = HOLES[n-1];
  document.getElementById('gHole').textContent = n;
  document.getElementById('gPar').textContent = h.par;
  document.getElementById('gStrokes').textContent = '0';
  document.getElementById('holeBanner').style.display = 'none';
  document.getElementById('shotBtn').disabled = false;
  document.getElementById('angleSlider').value = 0;
  document.getElementById('angleVal').textContent = '0°';
  document.getElementById('powerSlider').value = 50;
  document.getElementById('powerVal').textContent = '50%';
  showScreen('gameScreen');
  setTimeout(() => initGame(h), 50);
}

function initGame(holeData) {
  canvas = document.getElementById('golfCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  gameState = {
    hole: holeData,
    ball: {x: holeData.ball.x*W, y: holeData.ball.y*H, vx:0, vy:0, r:7},
    target: {x: holeData.hole.x*W, y: holeData.hole.y*H, r:13},
    obs: holeData.obs.map(o => ({
      ...o, x: o.x*W, y: o.y*H,
      r: o.r ? o.r*Math.min(W,H) : null,
      w: o.w ? o.w*W : null,
      h: o.h ? o.h*H : null,
    })),
    strokes: 0, moving: false, done: false,
  };
  draw();
}

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  W = canvas.width; H = canvas.height;
}
window.addEventListener('resize', () => { if(gameState) { resizeCanvas(); initGame(gameState.hole); } });

function draw() {
  if(!gameState || !ctx) return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#13301d';
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=40){
    ctx.fillStyle = i%80===0 ? 'rgba(52,211,153,.03)' : 'rgba(0,0,0,.05)';
    ctx.fillRect(i,0,40,H);
  }

  gameState.obs.forEach(o => {
    if(o.type === 'sand') {
      const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,'#f4d03f'); g.addColorStop(1,'#d4a017');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
    } else if(o.type === 'water') {
      const g = ctx.createLinearGradient(o.x,o.y,o.x,o.y+o.h);
      g.addColorStop(0,'#60a5fa'); g.addColorStop(1,'#2563eb');
      ctx.fillStyle = g;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = 'rgba(255,255,255,.3)';
      ctx.lineWidth = 1;
      for(let y=o.y+8;y<o.y+o.h;y+=8){
        ctx.beginPath();
        for(let x=o.x;x<o.x+o.w;x+=6) ctx.lineTo(x, y+Math.sin((x+Date.now()/200)*.1)*1.5);
        ctx.stroke();
      }
    } else if(o.type === 'wall') {
      ctx.fillStyle = '#6b4423';
      ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle = 'rgba(0,0,0,.2)';
      ctx.fillRect(o.x,o.y+o.h-3,o.w,3);
    }
  });

  // 홀
  const t = gameState.target;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 2; ctx.stroke();
  ctx.strokeStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(t.x,t.y-28); ctx.stroke();
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.moveTo(t.x,t.y-28); ctx.lineTo(t.x+14,t.y-23); ctx.lineTo(t.x,t.y-18);
  ctx.closePath(); ctx.fill();

  // 조준선
  if(!gameState.moving && !gameState.done) {
    const b = gameState.ball;
    const angle = +document.getElementById('angleSlider').value;
    const power = +document.getElementById('powerSlider').value;
    const dx = t.x - b.x, dy = t.y - b.y;
    const baseAngle = Math.atan2(dy,dx);
    const shotAngle = baseAngle + (angle * Math.PI/180);
    const len = 40 + power*1.0;
    const ex = b.x + Math.cos(shotAngle)*len;
    const ey = b.y + Math.sin(shotAngle)*len;
    ctx.strokeStyle = 'rgba(251,191,36,.75)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#fbbf24';
    ctx.save();
    ctx.translate(ex,ey);
    ctx.rotate(shotAngle);
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(-8,-5); ctx.lineTo(-8,5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // 공
  const b = gameState.ball;
  const g2 = ctx.createRadialGradient(b.x-2,b.y-2,0,b.x,b.y,b.r);
  g2.addColorStop(0,'#fff'); g2.addColorStop(1,'#d1d5db');
  ctx.fillStyle = g2;
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1; ctx.stroke();
}

function physicsStep() {
  if(!gameState || gameState.done || !gameState.moving) return;
  const b = gameState.ball;
  const t = gameState.target;

  let friction = 0.985;
  let inSand = false;
  gameState.obs.forEach(o => {
    if(o.type === 'sand') {
      const d = Math.hypot(b.x-o.x, b.y-o.y);
      if(d < o.r) inSand = true;
    }
  });
  if(inSand) friction = 0.92;

  b.x += b.vx; b.y += b.vy;
  b.vx *= friction; b.vy *= friction;

  if(b.x < b.r){b.x=b.r; b.vx*=-0.7;}
  if(b.x > W-b.r){b.x=W-b.r; b.vx*=-0.7;}
  if(b.y < b.r){b.y=b.r; b.vy*=-0.7;}
  if(b.y > H-b.r){b.y=H-b.r; b.vy*=-0.7;}

  gameState.obs.forEach(o => {
    if(o.type === 'wall') {
      if(b.x+b.r > o.x && b.x-b.r < o.x+o.w && b.y+b.r > o.y && b.y-b.r < o.y+o.h) {
        const oL = (b.x+b.r) - o.x;
        const oR = (o.x+o.w) - (b.x-b.r);
        const oT = (b.y+b.r) - o.y;
        const oB = (o.y+o.h) - (b.y-b.r);
        const m = Math.min(oL, oR, oT, oB);
        if(m === oL){b.x = o.x - b.r; b.vx = -Math.abs(b.vx)*0.7;}
        else if(m === oR){b.x = o.x+o.w + b.r; b.vx = Math.abs(b.vx)*0.7;}
        else if(m === oT){b.y = o.y - b.r; b.vy = -Math.abs(b.vy)*0.7;}
        else {b.y = o.y+o.h + b.r; b.vy = Math.abs(b.vy)*0.7;}
      }
    } else if(o.type === 'water') {
      if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) {
        gameState.strokes++;
        document.getElementById('gStrokes').textContent = gameState.strokes;
        const h = gameState.hole;
        b.x = h.ball.x*W; b.y = h.ball.y*H;
        b.vx = 0; b.vy = 0;
        gameState.moving = false;
        document.getElementById('shotBtn').disabled = false;
        showSplashText('💦 물에 빠짐! +1타');
      }
    }
  });

  const d = Math.hypot(b.x-t.x, b.y-t.y);
  const speed = Math.hypot(b.vx, b.vy);
  if(d < t.r && speed < 3) {
    gameState.done = true;
    gameState.moving = false;
    onHoleComplete();
    return;
  }

  if(speed < 0.15) {
    b.vx = 0; b.vy = 0;
    gameState.moving = false;
    document.getElementById('shotBtn').disabled = false;
  }
}

function showSplashText(msg) {
  const div = document.createElement('div');
  div.className = 'splash-text';
  div.textContent = msg;
  document.querySelector('.game-canvas-wrap').appendChild(div);
  setTimeout(() => div.remove(), 1200);
}

function doShot() {
  if(!gameState || gameState.moving || gameState.done) return;
  const b = gameState.ball;
  const t = gameState.target;
  const angle = +document.getElementById('angleSlider').value;
  const power = +document.getElementById('powerSlider').value;
  const baseAngle = Math.atan2(t.y-b.y, t.x-b.x);
  const shotAngle = baseAngle + (angle*Math.PI/180);
  const v = 2 + power*0.13;
  b.vx = Math.cos(shotAngle)*v;
  b.vy = Math.sin(shotAngle)*v;
  gameState.moving = true;
  gameState.strokes++;
  document.getElementById('gStrokes').textContent = gameState.strokes;
  document.getElementById('shotBtn').disabled = true;
}

function gameLoop() {
  if(gameState) {
    if(gameState.moving) physicsStep();
    draw();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

async function onHoleComplete() {
  const h = gameState.hole;
  const s = gameState.strokes;
  const diff = s - h.par;
  const prev = scores[currentHole];
  const isBest = prev === undefined || s < prev;

  if(isBest) {
    scores[currentHole] = s;
    await sbUpsert(currentHole, s);
  }

  let emoji='🎉', title='HOLE IN!';
  if(diff <= -2){emoji='🦅';title='EAGLE!';}
  else if(diff === -1){emoji='🐦';title='BIRDIE!';}
  else if(diff === 0){emoji='🎯';title='PAR';}
  else if(diff === 1){emoji='😅';title='BOGEY';}
  else{emoji='😵';title=`+${diff} 타`;}

  document.getElementById('hbEmoji').textContent = emoji;
  document.getElementById('hbTitle').textContent = title;
  document.getElementById('hbSub').innerHTML = `${s}타로 완료<br>${isBest?'<span style="color:#4ade80">🏆 최고 기록!</span>':`이전: ${prev}타`}`;
  document.getElementById('holeBanner').style.display = 'block';
}

function nextHoleOrFinish() {
  document.getElementById('holeBanner').style.display = 'none';
  if(currentHole < 9) startHole(currentHole+1);
  else showHoles();
}

// ════ SETTINGS ════
function showSettings() {
  _settingsFrom = document.querySelector('.screen.active')?.id || 'lobbyScreen';
  showScreen('settingsScreen');
  loadCfg();
}

function loadCfg() {
  const url = localStorage.getItem('pg_sb_url') || '';
  const key = localStorage.getItem('pg_sb_key') || '';
  document.getElementById('cfgUrl').value = url;
  document.getElementById('cfgKey').value = key;
  document.getElementById('cfgStatus').textContent = '';
  const cur = document.getElementById('cfgCurrent');
  if(url && key) {
    cur.style.display = 'block';
    document.getElementById('cfgCurUrl').textContent = '🔗 ' + url;
    const m = key.length > 30 ? key.slice(0,18)+'•••••'+key.slice(-6) : '•'.repeat(key.length);
    document.getElementById('cfgCurKey').textContent = '🔑 ' + m;
  } else cur.style.display = 'none';
}

async function saveCfg() {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  const st = document.getElementById('cfgStatus');
  if(!url || !key){st.style.color='#fca5a5';st.textContent='⚠️ URL과 Key 모두 입력';return;}
  if(!url.startsWith('https://')){st.style.color='#fca5a5';st.textContent='⚠️ https:// 로 시작';return;}
  st.style.color='var(--muted)'; st.textContent='🔄 연결 테스트 중...';
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 4000);
    const res = await fetch(`${url}/rest/v1/golf_scores?limit=1&select=id`, {
      headers:{'apikey':key,'Authorization':`Bearer ${key}`}, signal:ctrl.signal
    });
    if(!res.ok) throw new Error(`HTTP ${res.status} — 테이블 없거나 키 오류`);
    localStorage.setItem('pg_sb_url', url);
    localStorage.setItem('pg_sb_key', key);
    SUPABASE_URL = url; SUPABASE_KEY = key;
    st.style.color='#4ade80'; st.textContent='✅ 연결 성공! 저장 완료';
    loadCfg();
    setTimeout(() => showScreen(_settingsFrom), 1000);
  } catch(e) {
    st.style.color='#fca5a5';
    st.textContent = e.name==='AbortError' ? '⏱️ 응답 없음' : '❌ ' + e.message;
  }
}

function clearCfg() {
  if(!confirm('설정을 초기화할까요?')) return;
  localStorage.removeItem('pg_sb_url');
  localStorage.removeItem('pg_sb_key');
  SUPABASE_URL=''; SUPABASE_KEY='';
  loadCfg();
}

// ════ LEADERBOARD ════
async function showLb() {
  _settingsFrom = document.querySelector('.screen.active')?.id || 'lobbyScreen';
  showScreen('lbScreen');
  loadLb();
}

async function loadLb() {
  const body = document.getElementById('lbBody');
  body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">🔄 불러오는 중...</div>`;
  if(!SUPABASE_URL || !SUPABASE_KEY) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚙️ Supabase 설정이 필요합니다</div>`;
    return;
  }
  const rows = await sbGetLeaderboard();
  if(rows === null) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:#fca5a5">❌ 불러오기 실패 — Supabase 연결/테이블 확인</div>`;
    return;
  }
  if(!rows.length) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">아직 기록이 없습니다</div>`;
    return;
  }

  let html = `<div class="lb-title">⛳ 전체 ${rows.length}명</div>`;
  html += `<div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">타수가 적을수록 상위 · 9홀 완료 시 공식 기록</div>`;
  rows.forEach((p, i) => {
    const rank = i+1;
    const isMe = p.player_name === player.name;
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    const rankCls = rank<=3 ? `rank-${rank}` : '';
    html += `
      <div class="lb-row ${isMe?'me':''}">
        <div class="lb-rank ${rankCls}">${medal||rank}</div>
        <div class="lb-av">${p.avatar||'🧑'}</div>
        <div class="lb-name-wrap">
          <div class="lb-name">${p.player_name}${isMe?' <span style="color:var(--yellow);font-size:11px">(나)</span>':''}</div>
          <div class="lb-detail">${p.holes_done||0}홀 완료</div>
        </div>
        <div class="lb-right">
          <div class="lb-total">${p.total_strokes}타</div>
          <div class="lb-sub">${(p.holes_done||0)>=9?'🏆 완주':`${p.holes_done||0}/9`}</div>
        </div>
      </div>`;
  });
  body.innerHTML = html;
}

// ════ EVENT BINDING ════
document.addEventListener('DOMContentLoaded', () => {
  const bind = (id, fn) => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('click', fn);
  };

  bind('startBtn', startGame);
  bind('btnLobbySettings', showSettings);
  bind('btnLobbyRefresh', () => location.reload());
  bind('btnLobbyLb', showLb);

  bind('btnHolesBack', () => showScreen('lobbyScreen'));
  bind('btnHolesSettings', showSettings);
  bind('btnShowLb', showLb);
  bind('btnResetMe', resetMyScores);

  bind('btnGameBack', () => showHoles());
  bind('btnRetryHole', () => startHole(currentHole));
  bind('shotBtn', doShot);
  bind('hbNext', nextHoleOrFinish);

  const ang = document.getElementById('angleSlider');
  const pow = document.getElementById('powerSlider');
  ang.addEventListener('input', () => { document.getElementById('angleVal').textContent = ang.value + '°'; });
  pow.addEventListener('input', () => { document.getElementById('powerVal').textContent = pow.value + '%'; });

  bind('btnSettingsBack', () => showScreen(_settingsFrom));
  bind('btnCfgSave', saveCfg);
  bind('btnCfgClear', clearCfg);
  document.querySelectorAll('[data-toggle]').forEach(b => {
    b.addEventListener('click', () => {
      const inp = document.getElementById(b.dataset.toggle);
      if(inp.type === 'password'){inp.type='text'; b.textContent='🙈';}
      else {inp.type='password'; b.textContent='👁️';}
    });
  });

  bind('btnLbBack', () => showScreen(_settingsFrom));
  bind('btnLbRefresh', loadLb);
  bind('errCloseBtn', () => document.getElementById('errBox').style.display='none');

  console.log('✅ 파크골프 초기화 완료');
});
